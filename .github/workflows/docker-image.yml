name: Docker Multi-Arch Build & Auto-Release

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if agent version unchanged'
        required: false
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'
      skip_release:
        description: 'Build and push Docker image but skip GitHub Release creation'
        required: false
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  IMAGE_NAME: ${{ secrets.USER_HUB }}/azure-devops-agent
  UPSTREAM_REPO: microsoft/azure-pipelines-agent

jobs:
  # ── Phase 1: detect whether a new agent version is available ─────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      agent_version: ${{ steps.upstream.outputs.version }}
      should_build: ${{ steps.compare.outputs.should_build }}

    steps:
      - name: Get upstream agent version
        id: upstream
        run: |
          VERSION=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream agent version: $VERSION"

      - name: Get latest GitHub release tag
        id: get_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // ""' | sed 's/^v//')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest release: $LATEST"

      - name: Decide whether to build
        id: compare
        run: |
          CURRENT="${{ steps.upstream.outputs.version }}"
          LATEST="${{ steps.get_release.outputs.latest }}"
          FORCE="${{ github.event.inputs.force_build }}"
          if [[ "$CURRENT" != "$LATEST" || "$FORCE" == "true" ]]; then
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
            echo "Build needed: current=$CURRENT, latest_release=$LATEST, force=$FORCE"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date: $CURRENT"
          fi

  # ── Phase 2: build per-arch on native runners (no QEMU) ──────────────────────
  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            TARGETARCH=${{ matrix.platform == 'linux/amd64' && 'x64' || 'arm64' }}
            AGENT_VERSION=${{ needs.check-version.outputs.agent_version }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Phase 3: merge digests into multi-arch manifest ──────────────────────────
  build-and-push:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.check-version.outputs.agent_version }}"
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${VERSION} \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' $(ls /tmp/digests))

  # ── Phase 4: GitHub Release with upstream changelog ───────────────────────────
  release:
    needs: [check-version, build-and-push]
    if: needs.check-version.outputs.should_build == 'true' && github.event.inputs.skip_release != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTS=$(gh release view "v${{ needs.check-version.outputs.agent_version }}" \
            --repo ${{ github.repository }} 2>/dev/null && echo "true" || echo "false")
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"

      - name: Get upstream release notes
        id: notes
        run: |
          NOTES=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest \
            | jq -r '.body // "No release notes available."')
          echo "$NOTES" > /tmp/upstream-notes.md

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ needs.check-version.outputs.agent_version }}
          name: Azure DevOps Agent v${{ needs.check-version.outputs.agent_version }}
          body: |
            ## Azure DevOps Agent v${{ needs.check-version.outputs.agent_version }}

            ### Docker Hub
            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.agent_version }}
            docker pull ${{ env.IMAGE_NAME }}:latest
            ```

            ### Supported Architectures
            | Architecture | Platform |
            |---|---|
            | linux/amd64 | `latest`, `${{ needs.check-version.outputs.agent_version }}` |
            | linux/arm64 | `latest`, `${{ needs.check-version.outputs.agent_version }}` |

            ### Upstream Changelog
            ${{ steps.notes.outputs.body }}

            ---
            *Automated release — [upstream](https://github.com/${{ env.UPSTREAM_REPO }}/releases)*
