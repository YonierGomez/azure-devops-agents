name: Docker Multi-Arch Build & Auto-Release

on:
  schedule:
    - cron: '0 6 * * 1'  # Cada lunes a las 6:00 UTC
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.USER_HUB }}/azure-devops-agent
  UPSTREAM_REPO: microsoft/azure-pipelines-agent

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.compare.outputs.new_version }}
      agent_version: ${{ steps.upstream.outputs.version }}
    steps:
      - name: Get upstream agent version
        id: upstream
        run: |
          VERSION=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream agent version: $VERSION"

      - name: Get latest repo release
        id: current
        run: |
          CURRENT=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | jq -r '.tag_name // empty' | sed 's/^v//')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current release version: ${CURRENT:-none}"

      - name: Compare versions
        id: compare
        run: |
          UPSTREAM="${{ steps.upstream.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          if [ "$UPSTREAM" != "$CURRENT" ]; then
            echo "new_version=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: $UPSTREAM (current: ${CURRENT:-none})"
          else
            echo "new_version=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date: $CURRENT"
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.new_version == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Build and push multi-arch
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.agent_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [check-version, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get upstream release notes
        id: notes
        run: |
          NOTES=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest \
            | jq -r '.body // "No release notes available."')
          # Escape for GH Actions multiline
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ needs.check-version.outputs.agent_version }}
          name: Azure DevOps Agent v${{ needs.check-version.outputs.agent_version }}
          body: |
            ## Azure DevOps Agent v${{ needs.check-version.outputs.agent_version }}

            ### Docker Hub
            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.agent_version }}
            docker pull ${{ env.IMAGE_NAME }}:latest
            ```

            ### Arquitecturas soportadas
            | Arch | Platform |
            |------|----------|
            | x86_64 | `linux/amd64` |
            | ARM64 | `linux/arm64` |

            ### Upstream changelog
            ${{ steps.notes.outputs.body }}

            ---
            *Release automático — [upstream](${{ format('https://github.com/{0}/releases', env.UPSTREAM_REPO) }})*
